appId: com.zinxthreads.app
productName: Zinx Threads
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
# Register the zinx:// URL scheme so the installer sets the app as the OS handler for
# deep links (zinx://invite/<code>, zinx://connect/<token>, zinx://w/<slug>/…) — the
# "Open in app" flow. NOT auth (that runs entirely in the in-app login window). See
# src/main/index.ts (setAsDefaultProtocolClient + deep-link routing).
protocols:
  - name: Zinx Threads
    schemes:
      - zinx
win:
  executableName: zinx-threads
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  # AppImage (run-anywhere, just `chmod +x`) + deb. `snap` was dropped for beta — it needs
  # `snapcraft` on the build machine (absent on GitHub's `ubuntu-latest`) and a store login to be
  # useful; add it back once there's a reason to publish to the Snap Store.
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Distribution + auto-update = GitHub Releases. `electron-builder --publish always` (via the
# release:* scripts) builds the installers AND uploads them + the `latest*.yml` update manifests
# to a Release, which `electron-updater` (src/main/updater.ts) then reads. Needs a `GH_TOKEN`
# env var with `repo` scope. Beta builds are UNSIGNED — they auto-update on Windows/Linux;
# macOS refuses unsigned updates (re-download manually until signed).
publish:
  provider: github
  owner: fensken
  repo: zinx-threads
