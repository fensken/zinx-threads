# pnpm 11 build-script approvals. The "pnpm" field in package.json is no longer
# read; pnpm auto-generated this allow-list. Native/binary deps must be allowed
# to run their install scripts (esbuild binary, electron binary, winstaller).
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
minimumReleaseAgeExclude:
  - '@openai/codex-sdk@0.144.3'
  - '@openai/codex@0.144.3'
  - '@openai/codex@0.144.3-darwin-arm64'
  - '@openai/codex@0.144.3-darwin-x64'
  - '@openai/codex@0.144.3-linux-arm64'
  - '@openai/codex@0.144.3-linux-x64'
  - '@openai/codex@0.144.3-win32-arm64'
  - '@openai/codex@0.144.3-win32-x64'
