<!doctype html>
<!-- Theme (light/dark/system; default system) is resolved by the theme store before render. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- title / description / theme-color mirror `src/shared/brand.ts` (HTML can't import TS) -->
    <title>Zinx Threads</title>
    <!-- Favicon set — proper sizes, all generated from resources/logo.png by
         scripts/generate-icon.mjs (re-run it when the logo changes). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#e11d48" />
    <meta name="description" content="Zinx Threads — team chat, docs, and boards in one place." />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP
         connect-src is widened for Convex (realtime over wss + https), WorkOS
         AuthKit (token exchange), and Cloudflare R2 (the browser PUTs uploads
         straight to R2's S3 endpoint via a signed URL); applies to both the
         desktop and web builds. Uploaded images load from R2's public domain,
         already covered by `img-src https:`; page-block **audio/video** load over
         `media-src https:` (added for R2-hosted media); the page editor's **video-embed
         block** iframes YouTube/Vimeo, allowed by a tight `frame-src`. `connect-src` also allows the LiveKit
         signaling websocket — `ws://localhost:7880` for a local `livekit-server
         --dev`; for a self-hosted prod server ADD its `wss://<your-livekit-host>`
         here (WebRTC media itself is UDP and not CSP-gated). Narrow the wildcards
         to your exact deployment / AuthKit / R2 / LiveKit domain in prod. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; media-src 'self' blob: https:; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://player.vimeo.com; worker-src 'self' blob:; connect-src 'self' blob: https://*.convex.cloud wss://*.convex.cloud https://*.convex.site https://api.workos.com https://*.workos.com https://*.authkit.app https://cdn.jsdelivr.net https://*.r2.cloudflarestorage.com https://*.r2.dev ws://localhost:7880 wss://localhost:7880 wss://*.livekit.cloud https://*.livekit.cloud; form-action 'self' https://*.workos.com https://*.authkit.app"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
